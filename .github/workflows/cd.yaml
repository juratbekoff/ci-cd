name: Test CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    steps:
    - name: Connect to server and deploy changes
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: 22
        script: |
        cd ~/ci-cd
        git pull
        pm2 restart 6
        
            